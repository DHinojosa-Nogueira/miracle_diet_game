<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas</title>
    <link rel="stylesheet" href="./styles/stylesestadisticas.css"/>
    <link rel="icon" type="image/png" href="./images/creditos1.png">
</head>
<body>
    <div class="main-estadisticas">
        <div class="titulo-estadisticas">ESTADÍSTICAS</div>
        <div class="dato-row">
            <img class="dato1" src="./images/edad.png">
            <p class="texto1">EDAD: <span id="estadisticaEdad"></span></p>
        </div>
        <div class="dato-row">
            <img class="dato2" src="./images/sexo.png">
            <p class="texto2">M/H/O: <span id="estadisticaSexo"></span></p>
        </div>
        <div class="dato-row">
            <img class="dato3" src="./images/peso.png">
            <p class="texto3">IMC: <span id="estadisticaIMC"></span></p>
        </div>
        <div class="dato-row">
            <img class="dato4" src="./images/estudio.png">
            <p class="texto4">EST/TRA/OM: <span id="estadisticaOcupacion"></span></p>
        </div>
        <div class="dato-row">
            <img class="dato5" src="./images/puntuacion.png">
            <p class="texto5">%ACIERTOS: <span id="estadisticaPorcentaje"></span></p>
        </div>
        <div class="dato-row">
            <img class="dato6" src="./images/jugadores.png">
            <p class="texto6">PLAYERS:</p>
        </div>
        <div class="acciones-estadisticas">
            <a href="index.html">
                <img class="volver" src="./images/volver.jpg" alt="Volver">
            </a>
        </div>
    </div>
    <script src="./script/scriptestadisticas.js"></script>
</body>
</html>

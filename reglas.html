<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/stylesreglas.css"/>
    <link rel="icon" type="image/png" href="./images/creditos1.png">
    <title>Reglas</title>
</head>
<body>
<div class="main-reglas">
<div class="imgreglas-container">
    <img class="imgreglas" src="./images/comojugar.png" alt="Cómo jugar">
    <div class="texto-sobre-imagen">
        <span class="texto-arriba">COMO SE</span>
        <span class="texto-abajo">JUEGA</span>
    </div>
</div>
    <div class="explicacion">
        <p>Tendrás 60 segundos para decidir entre 20 dietas si son o no saludables</p>
    </div>
    <div class="botones-si-no">
        <div class="opcion">
            <img class="btnsi" src="./images/btnsi.png" alt="Sí">
            <p class="txtsi">SI</p>
        </div>
        <div class="opcion">
            <img class="btnno" src="./images/btnno.png" alt="No">
            <p class="txtno">NO</p>
        </div>
    </div>
    <div class="confirmar">
        <p class="txtconfirmar1">Antes de jugar, autoriza la recopilación de datos anónimos con fines de</p>
        <p class="txtconfirmar2">INVESTIGACIÓN</p>
    </div>
    <div class="acciones-reglas">
    <div class="aceptar-container">
        <p class="texto-acepta">ACEPTA</p>
        <a href="formulario.html">
            <img class="aceptar" src="./images/acepta.png" alt="Aceptar">
        </a>
    </div>
    <a href="index.html">
        <img class="volver" src="./images/volver.jpg" alt="Volver">
    </a>
</div>
</div>
</body>
</html>
